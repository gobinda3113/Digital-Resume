# Name of the workflow
name: Build and Deploy

# Controls when the action will run.
on:
  # Triggers the workflow on push events but only for the "main" branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build-and-deploy"
  build-and-deploy:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Grant permissions for the job to write to the repository
    permissions:
      contents: write

    # A sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Sets up Node.js so you can use npm commands
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Use a stable Long-Term Support version of Node.js
          cache: "npm" # Cache npm dependencies to speed up future builds

      # Step 3: Installs the project dependencies from package-lock.json
      - name: Install Dependencies
        run: npm ci

      # Step 4: Runs the build script to create the static website files in the './dist' folder
      - name: Build Project
        run: npm run build

      # Step 5: Deploys the contents of the './dist' folder to the 'gh-pages' branch
      # This is the branch that GitHub Pages will serve your website from.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
