name: Contact Form Processor

on:
  repository_dispatch:
    types: [contact_form_submission]

jobs:
  process-contact-form:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Create GitHub Issue from Contact Form
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        # Parse the incoming payload
        PAYLOAD='${{ toJSON(github.event.client_payload) }}'
        NAME=$(echo "$PAYLOAD" | jq -r '.name')
        EMAIL=$(echo "$PAYLOAD" | jq -r '.email')
        SUBJECT=$(echo "$PAYLOAD" | jq -r '.subject')
        MESSAGE=$(echo "$PAYLOAD" | jq -r '.message')
        TIMESTAMP=$(echo "$PAYLOAD" | jq -r '.timestamp')
        
        # Create issue title and body
        ISSUE_TITLE="Contact Form: $SUBJECT - $NAME"
        ISSUE_BODY=$'**From:** '$NAME$'\n**Email:** '$EMAIL$'\n**Subject:** '$SUBJECT$'\n**Timestamp:** '$TIMESTAMP$'\n\n**Message:**\n'$MESSAGE$'\n\n---\n*This issue was automatically created from a contact form submission.*'

        # Create the GitHub issue
        curl -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues \
          -d "{\"title\":\"$ISSUE_TITLE\",\"body\":\"$ISSUE_BODY\",\"labels\":[\"contact-form\"]}"

    - name: Send Email Notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USER }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "New Contact Form Submission: ${{ github.event.client_payload.subject || 'No Subject' }}"
        body: |
          New contact form submission received:
          
          Name: ${{ github.event.client_payload.name }}
          Email: ${{ github.event.client_payload.email }}
          Subject: ${{ github.event.client_payload.subject || 'No Subject' }}
          Message: ${{ github.event.client_payload.message }}
          
          Timestamp: ${{ github.event.client_payload.timestamp }}
          
          Check the GitHub issue for details.
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: ${{ secrets.EMAIL_USER }}